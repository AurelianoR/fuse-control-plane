services:
  fuse:
    build: .
    command: python -m uvicorn fuse.main:app --host 0.0.0.0 --port 8000
    environment:
      - COMPANY_API_URL=http://company:8010
      - VENDOR_URL=http://vendor:8020
    ports:
      - "8000:8000"
  company:
    build: .
    command: python -m uvicorn company_api.main:app --host 0.0.0.0 --port 8010
    environment:
      - FUSE_URL=http://fuse:8000
    ports:
      - "8010:8010"
  vendor:
    build: .
    command: python -m uvicorn vendor.main:app --host 0.0.0.0 --port 8020
    environment:
      - FUSE_URL=http://fuse:8000
      - COMPANY_API_URL=http://company:8010
      - VENDOR_URL=http://vendor:8020
      - VENDOR_CONNECTIONS=conn-02,conn-04
    ports:
      - "8020:8020"
