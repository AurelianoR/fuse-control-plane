version: "3.9"

services:
  # ── Python REST API ──────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fuse-api
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "com.fuse.service=api"
      - "com.fuse.description=Fuse Control Plane Python API"

  # ── Frontend Static Server ────────────────────────────────────────────────
  # Serves the dashboard HTML with a tiny nginx container
  frontend:
    image: nginx:alpine
    container_name: fuse-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    labels:
      - "com.fuse.service=frontend"
      - "com.fuse.description=Fuse Dashboard"

  # ── Out-of-band Collector Web Dashboard ───────────────────────────────────
  collector-web:
    build:
      context: .
      dockerfile: Dockerfile.collector
    container_name: fuse-collector-web
    ports:
      - "8001:8000"
    restart: unless-stopped
    labels:
      - "com.fuse.service=collector-web"
      - "com.fuse.description=Fuse OAuth Grant Collector Web Dashboard"

networks:
  default:
    name: fuse-network

